# Streamer configuration
#
# Phase 1 surface: [server], [camera0], [camera1], [stream], [power].
# Phase 2 adds [location], [schedule], [network] for the solar-aware
# HARD_SLEEP cycle. The schedule is opt-in via [schedule].enabled —
# when left at its default (false), the service runs in the Phase 1
# "always AWAKE" regime and [location] is not consulted.

[server]
host = "0.0.0.0"
port = 8080
# Single bearer token. Required on the Authorization header (or as a
# "?key=<token>" query parameter) for /api/status, /api/info, and the
# /stream/* MJPEG endpoints. Tailscale ACLs remain the primary access
# control; this token is defense-in-depth. The installer auto-generates
# a random value on first install.
auth_token = "change-me"
# Brand / site label shown on the per-camera pages and in the browser
# tab title. Empty falls back to "Streamer". Matches the umbrella
# project brand at https://ps20.hedgework.net/.
site_name = "HEDGEWORK @ PS 20"
# When true, the MJPEG streams and a minimal /api/public/status endpoint
# become anonymously accessible (no auth_token required) and serve
# permissive CORS headers, so they can be <img>-embedded in a webpage
# hosted on another origin (e.g. a public WordPress page). Token-gated
# endpoints (/api/status, /api/info, /api/admin/*) remain locked.
# Default false; only enable when you want anyone-with-the-URL to
# watch the cameras.
public_streams = false

[camera0]
resolution = [1280, 720]
# IMX708 sensor controls passed through to picamera2. Keep empty unless
# tuning a specific scene.
controls = {}
# Optional human-friendly label shown on the public /cam0 page header.
# Empty falls back to "Camera 0".
name = ""

[camera1]
resolution = [1280, 720]
controls = {}
name = ""

[stream]
# MJPEG output framerate. The sensor is configured with matching
# FrameDurationLimits so producer and consumer run at the same rate
# (no slow-consumer buffer pressure on libcamera). 1.0 fps is a good
# balance of LTE bandwidth (~640 kbps per viewer) and a live-looking
# feed.
framerate = 1.0
# JPEG quality 1-95. Higher = bigger file. 75 is a reasonable balance.
jpeg_quality = 75

[power]
disable_act_led = true
idle_grace_seconds = 10
# Hold both cameras open from service start, eliminating the first-frame
# latency (~3-10s at 1 fps) that viewers would otherwise see on a fresh
# connect to an idle camera. Costs ~1 W of camera power continuously.
# The Phase 2 power state machine automatically releases this hold
# outside the active window — see [schedule] below.
keep_cameras_warm = true
# When true, the state machine still transitions
# AWAKE -> ENTERING_SLEEP -> ASLEEP on the configured schedule but
# does NOT actually call rtcwake / systemctl poweroff. Instead,
# /stream/* returns 503 SLEEPING during the ASLEEP window. Useful
# for rehearsing a sleep cycle on a bench Pi without halting it.
# Also applies to the recovery power-cycle below (decision is logged
# but the Pi stays up).
dry_run = false
# ---- Self power-cycle recovery ----
# Last-resort rescue for a camera whose SerDes link wedges in a way
# that survives service restarts and warm reboots (only a real power
# cut re-trains it; with POWER_OFF_ON_HALT=1, rtcwake + poweroff IS
# a power cut). When a camera fails this many consecutive in-stream
# recovery attempts (~16 s apart, so 5 ≈ 80 s of confirmed wedge),
# the service arms the RTC and powers off; the Pi is back streaming
# ~2-3 minutes later with freshly re-trained camera links.
# NOTE: held at false pending field validation that a poweroff cycle
# actually cures a wedged link (proven for physical unplug; the
# rtcwake path is electrically equivalent but not yet demonstrated
# against a live wedge). Test manually first — see README.
recovery_power_cycle = false
recovery_failure_threshold = 5
# Hard cap on self-cycles per calendar day. Once exhausted the
# service stays up and keeps serving whichever cameras still work.
recovery_max_cycles_per_day = 3
# No self-cycle within this many minutes of service start: a camera
# that is dead (not just wedged) must not boot-loop the Pi and drain
# the battery.
recovery_boot_grace_minutes = 10
# How far in the future to arm the RTC alarm before powering off.
# Must comfortably exceed the shutdown duration.
recovery_wake_delay_seconds = 120

[location]
# Required when [schedule].enabled = true. The astral library uses
# these to compute sunrise/sunset for the current civil day. Phase 1
# deployments that don't enable the schedule can leave these at zero.
latitude = 0.0
longitude = 0.0
# IANA tz name; e.g. "America/New_York", "America/Los_Angeles",
# "Europe/Berlin". "UTC" is a safe fallback but timestamps in
# /api/status will be in UTC.
timezone = "UTC"

[schedule]
# Master switch. When false, the service is always AWAKE and the
# rest of this block + [location] are not consulted.
enabled = false
# Offsets applied to astronomical sunrise / sunset. Negative values
# move the event earlier in the day; positive later. Useful for
# pulling the AWAKE window earlier than civil twilight, etc.
sunrise_offset_minutes = 0
sunset_offset_minutes = 0
# Lead-time before sunset to enter ENTERING_SLEEP mode. During this
# window /stream/* responses carry a Warning header that the viewer
# UI surfaces as a banner; new connections are still served.
warn_minutes_before_sleep = 15
# How many minutes before sunrise the RTC alarm should fire, so the
# Pi has time to boot and warm both cameras before viewers connect.
wake_lead_minutes = 5

[network]
# LTE / uplink health probe. The result is reported on /api/status;
# Phase 2 does no automatic remediation, this is diagnosis only.
modem_probe_target = "1.1.1.1"
modem_probe_interval_seconds = 60
modem_probe_timeout_seconds = 5
